# =============================================================================
# clients.conf — RADIUS Clients (Docker)
# =============================================================================
# ${RADIUS_CLIENTS_SECRET} is replaced at startup by entrypoint.sh (envsubst)
#
# SECURITY: In production, remove wildcard ranges and use per-device entries
#           with unique secrets per NAS device at the bottom of this file.
# =============================================================================

# Localhost (healthcheck + radclient testing — required)
client localhost {
    ipaddr    = 127.0.0.1
    secret    = testing123
    nastype   = other
    shortname = localhost
}

client localhost_ipv6 {
    ipv6addr  = ::1
    secret    = testing123
    nastype   = other
    shortname = localhost-v6
}

# Docker network (inter-container communication)
client docker-net {
    ipaddr    = 172.28.0.0/24
    secret    = ${RADIUS_CLIENTS_SECRET}
    nastype   = other
    shortname = docker-net
    require_message_authenticator = yes
}

