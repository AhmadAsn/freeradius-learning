<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/daloradius/app/users
    <Directory /var/www/daloradius/app/users>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/users-error.log
    CustomLog ${APACHE_LOG_DIR}/users-access.log combined
</VirtualHost>
