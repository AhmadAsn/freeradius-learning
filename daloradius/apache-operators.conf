<VirtualHost *:8000>
    ServerName localhost
    DocumentRoot /var/www/daloradius/app/operators
    <Directory /var/www/daloradius/app/operators>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/operators-error.log
    CustomLog ${APACHE_LOG_DIR}/operators-access.log combined
</VirtualHost>
